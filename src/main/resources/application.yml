spring:
  application:
    name: haru-backend

  # DB
  datasource:
    url: jdbc:mysql://localhost:3306/haru_handap?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Mail
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Thymeleaf (이메일 템플릿)
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.haru_backend.domain
  configuration:
    map-underscore-to-camel-case: true

# JWT
jwt:
  secret: ${JWT_SECRET:haru-handap-secret-key-must-be-at-least-32-characters-long}
  expiration: 86400000

# AI API
ai:
  api-key: ${AI_API_KEY:}
  model: ${AI_MODEL:gpt-4o-mini}

# GitHub OAuth
github:
  client-id: ${GITHUB_CLIENT_ID:}
  client-secret: ${GITHUB_CLIENT_SECRET:}

# Server
server:
  port: 8081

# 질문 발송 설정
question:
  default-send-hour: 8

# 로깅
logging:
  level:
    com.haru_backend: DEBUG
    org.mybatis: DEBUG